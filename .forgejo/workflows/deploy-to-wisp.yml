name: Build & Deploy to Wisp

on:
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: codeberg-small

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Download Wisp CLI
        run: |
          curl -L "https://sites.wisp.place/nekomimi.pet/wisp-cli-binaries/wisp-cli-x86_64-linux" -o wisp-cli
          chmod +x wisp-cli

      - name: Deploy to Wisp
        env:
          WISP_HANDLE: ${{ secrets.WISP_HANDLE }}
          WISP_SITE: ${{ secrets.WISP_SITE_NAME }}
          WISP_APP_PASSWORD: ${{ secrets.WISP_APP_PASSWORD }}
        run: |
          ./wisp-cli deploy "$WISP_HANDLE" \
            --path ./_site \
            --site "$WISP_SITE" \
            --password "$WISP_APP_PASSWORD"
