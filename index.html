<html lang="en-UK">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />
        <title>Magnus</title>
        <meta property="theme-color" content="#333" />
        <meta name="description" content="those who snow" />
        <meta property="og:title" content="Magnus" />
        <meta property="og:type" content="website" />
        <link href="/assets/styles.css" rel="stylesheet" type="text/css" />
        {% favicon './favicon.svg' %}
    </head>
    <body>
        {% poison %}
        <script src="https://keepandroidopen.org/banner.js?size=minimal&animation=off"></script>
        <h1>Magnus</h1>
        <p>Check out my projects:</p>
        <br />
        <div class="icons">
            <a
                href="https://codeberg.org/Maganoos"
                target="_blank"
                class="nukeDeco"
                aria-label="Codeberg"
            >
                {% icon "simple-icons:codeberg" %}
            </a>
            <a
                href="https://modrinth.com/user/Maganoos"
                target="_blank"
                class="nukeDeco"
                aria-label="Modrinth"
            >
                {% icon "simple-icons:modrinth" %}
            </a>
            <a
                href="https://github.com/Maganoos"
                target="_blank"
                class="nukeDeco"
                aria-label="GitHub"
            >
                {% icon "simple-icons:github" %}
            </a>
        </div>
        <p>Or reach out at:</p>
        <a href="mailto:contact@magkari.eu">
            <code>contact@magkari.eu</code>
        </a>
        <div class="footer">
            <p>
                Current commit:
                <a
                    target="_blank"
                    href="https://github.com/Maganoos/magkari-eu/commit/{{ data.longHash }}"
                >
                    {{ data.shortHash }}
                </a>
            </p>
            <p>&copy; {{ data.year }} Maganoos</p>
        </div>
    </body>
</html>
